name: Deploy Bicep

on:
  workflow_call:
    inputs:
      location:
        required: true
        type: string
      bicepTemplate:
        required: true
        type: string
      bicepParamsFile:
        required: true
        type: string
      deploymentName:
        required: true
        type: string
      subscriptionId:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

jobs:
  deploy-bicep:
    name: Deploy Bicep to Subscription
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.subscriptionId }}

      - name: Verify Service Principal Permissions
        shell: bash
        run: |
          echo "Checking service principal permissions..."
          
          # Get the current subscription ID
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          echo "Subscription ID: $SUBSCRIPTION_ID"
          
          # Get service principal object ID from the Azure CLI context
          SP_OBJECT_ID=$(az account show --query user.name -o tsv)
          echo "Service Principal Object ID: $SP_OBJECT_ID"
          
          # Check role assignments for this service principal
          ROLE_ASSIGNMENTS=$(az role assignment list \
            --assignee $SP_OBJECT_ID \
            --scope /subscriptions/$SUBSCRIPTION_ID \
            --query "[?roleDefinitionName=='User Access Administrator' || roleDefinitionName=='Owner'].roleDefinitionName" \
            -o tsv)
          
          if echo "$ROLE_ASSIGNMENTS" | grep -qE "User Access Administrator|Owner"; then
            echo "✓ Service principal has required permissions to assign roles"
          else
            echo "⚠ Service principal does not have User Access Administrator or Owner role"
            echo "Role assignments will fail. Please run:"
            echo "az role assignment create --assignee $SP_OBJECT_ID --role 'User Access Administrator' --scope /subscriptions/$SUBSCRIPTION_ID"
          fi

      - name: Deploy Bicep to Subscription
        shell: bash
        run: |
          echo "Deploying bicep: ${{ inputs.bicepTemplate }}"
          az account show --output table
          
          az deployment sub create \
            --name "${{ inputs.deploymentName }}" \
            --location "${{ inputs.location }}" \
            --template-file "${{ inputs.bicepTemplate }}" \
            --parameters "${{ inputs.bicepParamsFile }}" \
            --only-show-errors

