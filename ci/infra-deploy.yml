name: egw-infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - dev
          - prod
      resourceGroup:
        description: Target resource group
        required: true
      location:
        description: Azure region
        required: false
        default: eastus2

permissions:
  id-token: write
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          az group create \
            --name "${{ github.event.inputs.resourceGroup }}" \
            --location "${{ github.event.inputs.location }}"

      - name: Validate Bicep
        run: |
          az deployment group validate \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file EGW_Azure_Infrastructure/bicep/main.bicep \
            --parameters EGW_Azure_Infrastructure/bicep/parameters/${{ github.event.inputs.environment }}.bicepparam \
            --parameters postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}'

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file EGW_Azure_Infrastructure/bicep/main.bicep \
            --parameters EGW_Azure_Infrastructure/bicep/parameters/${{ github.event.inputs.environment }}.bicepparam \
            --parameters postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}' \
            --query "properties.outputs" \
            --output jsonc
